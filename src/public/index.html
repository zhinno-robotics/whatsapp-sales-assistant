<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Sales Assistant</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; }
a { color: #4fc3f7; }

/* Sidebar */
#sidebar { width: 280px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar h2 { padding: 18px 20px 12px; font-size: 16px; font-weight: 600; color: #fff; border-bottom: 1px solid #2a2a2a; }
#sidebar .status { padding: 8px 20px 14px; font-size: 12px; color: #4caf50; display: flex; align-items: center; gap: 6px; }
#sidebar .status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
#searchBox { padding: 0 16px 10px; }
#searchBox input { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; color: #ddd; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
#searchBox input:focus { border-color: #7c4dff; }
#searchBox input::placeholder { color: #555; }
#chatList { flex: 1; overflow-y: auto; }
#chatList .item { padding: 14px 20px; cursor: pointer; border-bottom: 1px solid #222; transition: background .15s; display: flex; flex-direction: column; gap: 3px; }
#chatList .item:hover { background: #252525; }
#chatList .item.active { background: #2a2a40; border-left: 3px solid #7c4dff; padding-left: 17px; }
#chatList .item .name { font-size: 14px; font-weight: 500; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#chatList .item .preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#chatList .item .time { font-size: 11px; color: #666; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#main .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; font-size: 16px; flex-direction: column; gap: 8px; }
#main .chat-header { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; font-size: 15px; font-weight: 600; color: #fff; flex-shrink: 0; }
#messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* Message bubbles */
.msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
.msg.customer { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.me { background: #1a3a5c; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg .trans { margin-top: 8px; padding-top: 8px; border-top: 1px solid #444; font-size: 13px; color: #aaa; }
.msg .trans::before { content: '🇨🇳 '; font-size: 11px; }
.msg .meta { font-size: 11px; color: #666; margin-bottom: 4px; }

/* Suggestions */
.suggestions { margin: 4px 0 8px 0; align-self: flex-start; width: 100%; max-width: 600px; }
.suggestions .title { font-size: 12px; color: #888; margin-bottom: 6px; }
.suggestions .btns { display: flex; gap: 8px; flex-wrap: wrap; }
.suggestions .sug-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #444; background: #1e1e1e; color: #ccc; cursor: pointer; font-size: 12px; transition: all .15s; }
.suggestions .sug-btn:hover { background: #333; border-color: #7c4dff; color: #fff; }

/* Reply input */
#replyBox { padding: 16px 24px; border-top: 1px solid #2a2a2a; display: flex; gap: 10px; flex-shrink: 0; }
#replyBox textarea { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #ddd; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 160px; overflow-y: auto; line-height: 1.4; outline: none; }
#replyBox textarea:focus { border-color: #7c4dff; }
#replyBox button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
#replyBox .btn-send { background: #7c4dff; color: #fff; }
#replyBox .btn-send:hover { background: #651fff; }
#replyBox .btn-ai { background: #1e1e1e; color: #aaa; border: 1px solid #444; }
#replyBox .btn-ai:hover { background: #2a2a2a; color: #fff; }

/* Popup / overlay */
#aiPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center; }
#aiPopup.show { display: flex; }
#aiPopup .box { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw; }
#aiPopup .box h3 { font-size: 15px; margin-bottom: 12px; color: #fff; }
#aiPopup .box textarea { width: 100%; min-height: 60px; max-height: 200px; background: #111; border: 1px solid #333; border-radius: 8px; color: #ddd; padding: 10px; font-family: inherit; font-size: 14px; outline: none; resize: none; overflow-y: auto; }
#aiPopup .box textarea:focus { border-color: #7c4dff; }
#aiPopup .box .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
#aiPopup .box button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
#aiPopup .box .btn-gen { background: #7c4dff; color: #fff; }
#aiPopup .box .btn-cancel { background: #333; color: #aaa; }
#aiPopup .box .result { margin-top: 16px; padding: 12px; background: #111; border-radius: 8px; color: #ccc; font-size: 14px; display: none; }
#aiPopup .box .result textarea { width: 100%; min-height: 60px; max-height: 200px; resize: none; overflow-y: auto; }
#aiPopup .box .result .actions { margin-top: 10px; }
#aiPopup .box .result .btn-use { background: #4caf50; color: #fff; }

/* Reply Modal */
#replyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 200; justify-content: center; align-items: center; }
#replyModal.show { display: flex; }
#replyModal .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 14px; width: 700px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
#replyModal .modal-header { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
#replyModal .modal-header .msg-preview { font-size:13px; color:#ddd; margin-top:6px; padding:8px 12px; background:#111; border-radius:6px; max-height:80px; overflow-y:auto; }
#replyModal .modal-header .msg-preview .zh { font-size:12px; color:#888; margin-top:4px; }
#replyModal .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
#replyModal .modal-body .opt-cards { display: flex; flex-direction: column; gap: 8px; }
#replyModal .modal-body .opt-card { padding: 12px 16px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; cursor: pointer; transition: all .15s; }
#replyModal .modal-body .opt-card:hover { background: #252525; border-color: #555; }
#replyModal .modal-body .opt-card.selected { border-color: #7c4dff; background: #1a1a30; }
#replyModal .modal-body .opt-card .label { font-size: 11px; color: #7c4dff; font-weight: 600; margin-bottom: 4px; }
#replyModal .modal-body .opt-card .en { font-size: 13px; color: #ddd; }
#replyModal .modal-body .opt-card .zh { font-size: 12px; color: #888; margin-top: 4px; }
#replyModal .modal-footer { padding: 16px 20px; border-top: 1px solid #2a2a2a; flex-shrink: 0; }
#replyModal .modal-footer textarea { width: 100%; background:#111; border:1px solid #333; border-radius:8px; color:#ddd; padding:10px 14px; font-family:inherit; font-size:14px; resize:none; min-height:60px; max-height:200px; overflow-y:auto; outline:none; }
#replyModal .modal-footer textarea:focus { border-color:#7c4dff; }
#replyModal .modal-footer .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; flex-wrap:wrap; }
#replyModal .modal-footer .actions button { padding:8px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; }
#replyModal .modal-footer .btn-en { background:#7c4dff; color:#fff; }
#replyModal .modal-footer .btn-zh { background:#e91e63; color:#fff; }
#replyModal .modal-footer .btn-cancel { background:#333; color:#aaa; }
#replyModal .modal-footer .btn-retry { background:transparent; color:#888; border:1px solid #444; }

/* ── Compact / Sidebar Mode (WhatsApp mobile style) ── */

/* === Dark theme (default) === */
:root {
  --bg-list: #111b21; --bg-header: #202c33; --bg-chat: #0b141a; --bg-msg-area: #0e1c24;
  --bg-input: #202c33; --bg-input-field: #2a3942;
  --text-primary: #e9edef; --text-secondary: #8696a0; --text-time: #8696a0;
  --border: #2a3942; --border-light: #1f2c33;
  --hover: #202c33; --active: #2a3942;
  --send-btn: #00a884; --send-btn-text: #fff; --ai-btn-bg: #2a3942; --ai-btn-text: #8696a0;
  --msg-customer: #202c33; --msg-me: #005c4b;
}

/* === Light theme === */
html.light body.compact {
  --bg-list: #ffffff; --bg-header: #f0f2f5; --bg-chat: #efeae2; --bg-msg-area: #efeae2;
  --bg-input: #f0f2f5; --bg-input-field: #ffffff;
  --text-primary: #111b21; --text-secondary: #667781; --text-time: #667781;
  --border: #e9edef; --border-light: #f0f2f5;
  --hover: #f5f6f6; --active: #e9edef;
  --send-btn: #00a884; --send-btn-text: #fff; --ai-btn-bg: #e9edef; --ai-btn-text: #667781;
  --msg-customer: #ffffff; --msg-me: #d9fdd3;
}

html.compact body { flex-direction: column !important; }

/* === Sidebar: chat list (default view) === */
html.compact #sidebar {
  width: 100% !important; flex: 1; overflow-y: auto; flex-shrink: 1;
  background: var(--bg-list); border-right: none; display: flex; flex-direction: column;
}
html.compact #sidebar.hide { display: none !important; }

/* Header bar with title + toggles */
html.compact #sidebar h2 {
  background: var(--bg-header); padding: 8px 14px; font-size: 15px; font-weight: 500;
  color: var(--text-primary); border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; gap: 6px; margin: 0;
}
html.compact #sidebar .status {
  padding: 5px 14px; font-size: 10px; background: var(--bg-list);
  border-bottom: 1px solid var(--border-light); flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
}
html.compact .hdr-toggle {
  font-size: 10px; cursor: pointer; padding: 2px 8px; border-radius: 10px;
  border: 1px solid var(--border); color: var(--text-secondary);
  white-space: nowrap; user-select: none; margin-left: auto;
}
html.compact .hdr-toggle.on { background: var(--send-btn); color: var(--send-btn-text); border-color: var(--send-btn); }

/* Search box — compact */
html.compact #searchBox {
  padding: 6px 10px; background: var(--bg-list);
  border-bottom: 1px solid var(--border-light); flex-shrink: 0;
}
html.compact #searchBox input {
  width: 100%; background: var(--bg-input-field); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); padding: 8px 12px;
  font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
}
html.compact #searchBox input:focus { border-color: var(--send-btn); }
html.compact #searchBox input::placeholder { color: var(--text-secondary); }

/* === Contact list items — WhatsApp mobile style === */
html.compact #chatList { flex: 1; overflow-y: auto; }
html.compact #chatList .item {
  padding: 10px 14px; border-bottom: 1px solid var(--border-light);
  background: var(--bg-list); display: flex; flex-direction: row; align-items: center; gap: 12px;
  transition: background .12s; cursor: pointer;
}
html.compact #chatList .item:hover { background: var(--hover); }
html.compact #chatList .item.active { background: var(--active); }

/* Avatar: circular, initial letter, colored background */
html.compact #chatList .item .avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 500; color: #fff; text-transform: uppercase;
}
html.compact #chatList .item .info { flex: 1; min-width: 0; }
html.compact #chatList .item .name {
  color: var(--text-primary); font-size: 14px; font-weight: 400;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
html.compact #chatList .item .preview {
  color: var(--text-secondary); font-size: 12px; margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
html.compact #chatList .item .meta { text-align: right; flex-shrink: 0; }
html.compact #chatList .item .time {
  color: var(--text-time); font-size: 10px; white-space: nowrap;
}
html.compact #chatList .item .group-tag {
  font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-top: 4px; display: inline-block;
  background: #2a3942; color: #8696a0;
}
html.light body.compact #chatList .item .group-tag { background: #e9edef; color: #667781; }

/* Groups divider */
html.compact #chatList .divider {
  padding: 8px 14px 4px; font-size: 10px; font-weight: 500; letter-spacing: .5px;
  color: var(--send-btn); text-transform: uppercase; flex-shrink: 0;
  background: var(--bg-list); border-bottom: 1px solid var(--border-light);
}

/* === Main: chat view (hidden until contact clicked) === */
html.compact #main {
  flex: 1; min-height: 0; display: none; flex-direction: column;
  background: var(--bg-chat);
}
html.compact #main.active { display: flex !important; }

html.compact #main .chat-header {
  background: var(--bg-header); padding: 8px 10px; font-size: 14px; font-weight: 500;
  color: var(--text-primary); border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}

/* Back button — WhatsApp-style arrow */
html.compact #backBtn {
  display: none; cursor: pointer; color: var(--text-secondary);
  width: 36px; height: 36px; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0; user-select: none; transition: background .15s;
}
html.compact #backBtn svg { display: block; }
html.compact #backBtn.visible { display: flex !important; }
html.compact #backBtn:hover { background: var(--hover); color: var(--text-primary); }

html.compact #emptyState { display: none !important; }

html.compact #messages {
  flex: 1; padding: 10px 12px; gap: 8px; overflow-y: auto;
  background: var(--bg-msg-area);
}
html.compact .msg { max-width: 82%; font-size: 13px; padding: 8px 10px; }
html.compact .msg.customer { background: var(--msg-customer); color: var(--text-primary); }
html.compact .msg.me { background: var(--msg-me); color: var(--text-primary); }

html.compact #replyBox {
  padding: 8px 10px; gap: 6px; flex-shrink: 0; background: var(--bg-input);
}
html.compact #replyBox textarea {
  min-height: 40px; max-height: 140px; font-size: 13px; padding: 10px 12px; resize: none; overflow-y: auto;
  background: var(--bg-input-field); border: 1px solid var(--border); color: var(--text-primary);
  border-radius: 8px; outline: none;
}
html.compact #replyBox textarea:focus { border-color: var(--send-btn); }
html.compact #replyBox button { padding: 6px 10px; font-size: 12px; white-space: nowrap; border-radius: 8px; border: none; cursor: pointer; }
html.compact #replyBox .btn-send { background: var(--send-btn); color: var(--send-btn-text); }
html.compact #replyBox .btn-ai { background: var(--ai-btn-bg); color: var(--ai-btn-text); border: 1px solid var(--border); }

/* === Modals — WhatsApp themed === */

/* Overlay */
html.compact #aiPopup,
html.compact #replyModal {
  background: rgba(0,0,0,.55);
}

/* AI Popup — container */
html.compact #aiPopup .box {
  width: 100%; max-width: 100%; border-radius: 0;
  background: var(--bg-header); color: var(--text-primary);
  border: 1px solid var(--border); padding: 16px;
  margin: auto 0 0 0; max-height: 90vh; overflow-y: auto;
  align-self: flex-end;
}
html.compact #aiPopup .box h3 {
  font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 10px;
}
html.compact #aiPopup .box textarea {
  width: 100%; min-height: 60px; max-height: 180px; background: var(--bg-input-field); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); padding: 10px;
  font-family: inherit; font-size: 13px; outline: none; resize: none; overflow-y: auto;
}
html.compact #aiPopup .box textarea:focus { border-color: var(--send-btn); }
html.compact #aiPopup .box .actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px;
}
html.compact #aiPopup .box button {
  padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: opacity .15s;
}
html.compact #aiPopup .box button:active { opacity: .7; }
html.compact #aiPopup .box .btn-gen { background: var(--send-btn); color: var(--send-btn-text); }
html.compact #aiPopup .box .btn-cancel { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
html.compact #aiPopup .box .result {
  margin-top: 14px; padding: 12px; background: var(--bg-msg-area);
  border-radius: 8px; font-size: 13px; border: 1px solid var(--border);
}
html.compact #aiPopup .box .result textarea {
  width: 100%; min-height: 60px; max-height: 180px; background: var(--bg-input-field); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); padding: 8px 12px;
  font-family: inherit; font-size: 13px; resize: none; overflow-y: auto; outline: none;
}
html.compact #aiPopup .box .result textarea:focus { border-color: var(--send-btn); }
html.compact #aiPopup .box .result .btn-use { border-radius: 8px; padding: 7px 16px; font-size: 12px; margin: 4px 4px 0 0; }
html.compact #aiPopup .box .result .btn-use:first-of-type { background: var(--send-btn) !important; color: var(--send-btn-text) !important; }
html.compact #aiPopup .box .result .btn-use:last-of-type { background: var(--ai-btn-bg) !important; color: var(--ai-btn-text) !important; border: 1px solid var(--border) !important; }

/* Reply Modal — container */
html.compact #replyModal .modal {
  width: 100%; max-width: 100%; border-radius: 0; max-height: 100vh;
  background: var(--bg-header); color: var(--text-primary);
  border: none; display: flex; flex-direction: column; overflow: hidden;
}
html.compact #replyModal .modal-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
html.compact #replyModal .modal-header h3 {
  font-size: 14px !important; font-weight: 500; color: var(--text-primary) !important; margin: 0 0 6px;
}
html.compact #replyModal .modal-header .msg-preview {
  font-size: 12px; color: var(--text-primary); margin-top: 4px;
  padding: 8px 12px; background: var(--msg-customer); border-radius: 8px;
  max-height: 70px; overflow-y: auto;
}
html.compact #replyModal .modal-header .msg-preview .zh {
  font-size: 11px; color: var(--text-secondary); margin-top: 3px;
}

html.compact #replyModal .modal-body {
  flex: 1; overflow-y: auto; padding: 8px 14px;
}
html.compact #replyModal .modal-body .opt-cards {
  display: flex; flex-direction: column;
}
html.compact #replyModal .modal-body .opt-card.selected {
  border-color: var(--send-btn) !important; background: var(--active);
}

/* Suggestions toggle button */
html.compact #modalToggleSuggestions {
  color: var(--text-secondary) !important;
}

html.compact #replyModal .modal-footer {
  padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg-header);
}
html.compact #replyModal .modal-footer textarea {
  width: 100%; background: var(--bg-input-field); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); padding: 8px 12px;
  font-family: inherit; font-size: 13px; resize: vertical; min-height: 50px; outline: none;
}
html.compact #replyModal .modal-footer textarea:focus { border-color: var(--send-btn); }
html.compact #replyModal .modal-footer .actions {
  display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap;
}
html.compact #replyModal .modal-footer .actions button {
  padding: 7px 14px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 500; transition: opacity .15s;
}
html.compact #replyModal .modal-footer .actions button:active { opacity: .7; }
html.compact #replyModal .modal-footer .btn-en { background: var(--send-btn); color: var(--send-btn-text); }
html.compact #replyModal .modal-footer .btn-zh { background: var(--send-btn); color: var(--send-btn-text); }
html.compact #replyModal .modal-footer .btn-cancel { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
html.compact #replyModal .modal-footer .btn-retry { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
html.compact #replyModal .modal-footer .btn-trans { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
html.compact #replyModal .modal-footer #modalTranslation { background: var(--bg-msg-area); }

/* AI popup result textarea (Chinese — editable) */
html.compact #aiResultZh {
  width: 100% !important; min-height: 60px; max-height: 180px; background: var(--bg-input-field); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); padding: 8px 12px;
  font-family: inherit; font-size: 13px; resize: none; overflow-y: auto; outline: none;
}
html.compact #aiResultZh:focus { border-color: var(--send-btn); }

/* Reply modal textarea — larger */
html.compact #replyModal .modal-footer textarea {
  width: 100%; background: var(--bg-input-field); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); padding: 8px 12px;
  font-family: inherit; font-size: 13px; resize: none; min-height: 60px; max-height: 200px; overflow-y: auto; outline: none;
}
html.compact #aiResultZh:focus { border-color: var(--send-btn); }
html.compact .btn-trans { border-radius: 8px; cursor: pointer; font-size: 12px; padding: 7px 14px; }

html.compact #compactStatusBar { display: none !important; }
</style>
<script>// Prevent FOUC in sidebar mode
(function(){if(window.location.search.includes('sidebar=1')){document.documentElement.classList.add('compact');}})();
</script>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>
    💬 Chats
    <span class="hdr-toggle on" id="toggleGroups" onclick="toggleGroupFilter()" title="Show/hide groups">Groups</span>
    <span class="hdr-toggle" id="toggleTheme" onclick="toggleTheme()" title="Light/dark mode">🌙</span>
  </h2>
  <div class="status">Connected</div>
  <div id="searchBox"><input type="text" id="searchInput" placeholder="Search contacts..." autocomplete="off" /></div>
  <div id="chatList"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="compactStatusBar" style="display:none;padding:4px 14px;font-size:11px;color:#888;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:6px">
    <span class="cs-dot" style="width:7px;height:7px;border-radius:50%;background:#ff9800;display:inline-block"></span>
    <span class="cs-text">Connecting...</span>
  </div>
  <div class="empty" id="emptyState">
    <div style="font-size:40px">📱</div>
    <div>Select a conversation or wait for new messages</div>
  </div>
  <div class="chat-header" id="chatHeader" style="display:none">
    <div id="backBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
    <span id="chatHeaderText"></span>
  </div>
  <div id="messages"></div>
  <div id="replyBox" style="display:none">
    <textarea id="replyInput" placeholder="Type your reply... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button class="btn-ai" onclick="openAIPopup()" title="AI 帮你写回复">✨ AI</button>
    <button class="btn-send" onclick="sendReply()">Send</button>
  </div>
</div>

<!-- AI Popup -->
<div id="aiPopup">
  <div class="box">
    <h3>AI Custom Reply</h3>
    <textarea id="aiPrompt" placeholder="输入你的要求，AI 自动生成英文回复&#10;例如：告诉客户价格可以打 9 折，但需要本周下单"></textarea>
    <div class="actions">
      <button class="btn-cancel" onclick="closeAIPopup()">Cancel</button>
      <button class="btn-gen" onclick="generateAI()">Generate ✨</button>
    </div>
    <div class="result" id="aiResult">
      <textarea id="aiResultZh" placeholder="AI-generated reply in Chinese (editable)"></textarea>
      <div id="aiResultEn" style="display:none;margin-top:6px;padding:8px;background:var(--bg-msg-area);border-radius:6px;font-size:12px;color:var(--text-secondary)"></div>
      <div class="actions" style="margin-top:8px">
        <button class="btn-trans" onclick="translateAIResult()">🌐 EN</button>
        <button class="btn-use" onclick="sendAIResult('zh')">Send ZH</button>
        <button class="btn-use" onclick="sendAIResult('en')">Send EN</button>
        <button class="btn-cancel" onclick="closeAIPopup()">Discard</button>
      </div>
    </div>
  </div>
</div>

<!-- Reply Modal -->
<div id="replyModal">
  <div class="modal">
    <div class="modal-header">
      <h3 style="font-size:15px;color:#fff;margin:0">✏️ Reply to Message</h3>
      <div class="msg-preview" id="modalMsgPreview"></div>
    </div>
    <div class="modal-body">
      <button id="modalToggleSuggestions" class="sug-toggle" onclick="toggleModalSuggestions()" style="background:var(--bg-input-field);border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;width:100%;text-align:left">💡 5 AI Suggestions ▸</button>
      <div class="opt-cards" id="modalOptCards" style="display:none;margin-top:6px;max-height:180px;overflow-y:auto;gap:6px">
        <div style="color:#666;text-align:center;padding:30px">⏳ Generating suggestions...</div>
      </div>
    </div>
    <div class="modal-footer">
      <textarea id="modalEditText" placeholder="Select a suggestion above to edit the Chinese reply..."></textarea>
      <div id="modalTranslation" style="display:none;margin-top:6px;padding:6px 10px;border-radius:6px;font-size:12px;background:var(--bg-msg-area, #111);color:var(--text-secondary, #aaa)"></div>
      <div class="actions">
        <button class="btn-trans" onclick="translateModalText()" style="background:transparent;color:var(--text-secondary, #aaa);border:1px solid var(--border, #444)">🌐 Translate</button>
        <button class="btn-retry" onclick="retryModalSuggestions()">🔄 Retry</button>
        <button class="btn-cancel" onclick="closeReplyModal()">Cancel</button>
        <button class="btn-zh" onclick="sendModalReply('zh')">Send ZH</button>
        <button class="btn-en" onclick="sendModalReply('en')">Send EN</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────
const state = {
  chats: {},          // chatId -> { chat_id, contact_name, contact_number, last_activity, messages: [] }
  activeChat: null,
  aiResultText: '',
  aiResultTextZh: '',
};

// DOM refs
const $chatList = document.getElementById('chatList');
const $chatHeader = document.getElementById('chatHeader');
const $messages = document.getElementById('messages');
const $replyBox = document.getElementById('replyBox');
const $replyInput = document.getElementById('replyInput');
const $emptyState = document.getElementById('emptyState');
const $aiPopup = document.getElementById('aiPopup');
const $aiPrompt = document.getElementById('aiPrompt');
const $aiResult = document.getElementById('aiResult');
const $searchInput = document.getElementById('searchInput');

// ─── Search ──────────────────────────────────────────────────
$searchInput.addEventListener('input', () => updateChatList());
$searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const item = $chatList.querySelector('.item');
    if (item) {
      const chatId = item.getAttribute('onclick').match(/'([^']+)'/)?.[1];
      if (chatId) selectChat(chatId);
    }
  }
  if (e.key === 'Escape') {
    $searchInput.value = '';
    updateChatList();
  }
});

// ─── SSE Connection ─────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/events');

  es.addEventListener('connected', () => {
    document.querySelector('#sidebar .status').textContent = 'Checking...';
    document.querySelector('#sidebar .status').style.color = '#ff9800';
    loadChats();
    checkWhatsAppStatus();
  });

  es.addEventListener('new_message', (e) => {
    const msg = JSON.parse(e.data);
    addMessage(msg);
    updateChatList();
  });

  es.addEventListener('message_updated', (e) => {
    const update = JSON.parse(e.data);
    applyUpdate(update);
  });

  es.addEventListener('message_sent', (e) => {
    const data = JSON.parse(e.data);
    addSentMessage(data);
    updateChatList();
  });

  es.addEventListener('chat_synced', (e) => {
    const data = JSON.parse(e.data);
    if (isChannelChat(data.chatId)) return;
    if (!state.chats[data.chatId]) {
      state.chats[data.chatId] = {
        chat_id: data.chatId,
        contact_name: data.contactName,
        contact_number: data.contactNumber,
        last_activity: Date.now() / 1000,
        messages: [],
      };
      loadHistory(data.chatId);
    }
    updateChatList();
  });

  es.onerror = () => {
    const s = document.querySelector('#sidebar .status');
    if (s) { s.textContent = 'Reconnecting...'; s.style.color = '#ff9800'; }
    const cs = document.querySelector('#compactStatusBar .cs-text');
    if (cs) cs.textContent = 'Reconnecting...';
    const cd = document.querySelector('#compactStatusBar .cs-dot');
    if (cd) cd.style.background = '#ff9800';
  };
}

// ─── API Calls ──────────────────────────────────────────────
async function loadChats() {
  try {
    const res = await fetch('/api/chats');
    const chats = await res.json();
    for (const c of chats) {
      if (isChannelChat(c.chat_id)) continue;
      if (!state.chats[c.chat_id]) {
        state.chats[c.chat_id] = { ...c, messages: [] };
        // Load history
        const hres = await fetch(`/api/history/${c.chat_id}`);
        const history = await hres.json();
        state.chats[c.chat_id].messages = history;
      }
    }
    updateChatList();
  } catch (err) { console.error('loadChats:', err); }
}

async function loadHistory(chatId) {
  try {
    const res = await fetch(`/api/history/${chatId}`);
    const history = await res.json();
    if (state.chats[chatId]) {
      state.chats[chatId].messages = history;
    }
  } catch (err) { console.error('loadHistory:', err); }
}

async function apiSend(chatId, text) {
  if (!chatId) {
    alert('Error: No conversation selected. Please select a chat from the sidebar first.');
    return;
  }
  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, text }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Send failed');
    }
  } catch (err) {
    alert('Send failed: ' + err.message + '\n\nMake sure the server is running (npm start).');
    throw err;
  }
}

async function apiCustom(chatId, prompt) {
  const res = await fetch('/api/custom', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chatId, prompt }),
  });
  const data = await res.json();
  return { en: data.reply, zh: data.zh || '' };
}

// ─── Message Handling ──────────────────────────────────────
function addMessage(msg) {
  if (isChannelChat(msg.chatId)) return;
  if (!state.chats[msg.chatId]) {
    state.chats[msg.chatId] = {
      chat_id: msg.chatId,
      contact_name: msg.contactName || 'Unknown',
      contact_number: msg.contactNumber || '',
      last_activity: msg.timestamp,
      messages: [],
    };
  }

  const chat = state.chats[msg.chatId];
  // Avoid duplicate
  const exists = chat.messages.find(m => m.message_id === msg.messageId);
  if (!exists) {
    chat.messages.push({
      message_id: msg.messageId,
      sender: 'customer',
      body: msg.body,
      translation: msg.translation,
      suggestions: msg.suggestions || [],
      timestamp: msg.timestamp,
      isVoice: msg.isVoice || false,
      transcription: msg.transcription || null,
    });
  }
  chat.last_activity = msg.timestamp;
  if (!chat.contact_name || chat.contact_name === 'Unknown') {
    chat.contact_name = msg.contactName || 'Unknown';
    chat.contact_number = msg.contactNumber || '';
  }

  renderIfActive(msg.chatId);
  updateChatList();
}

function applyUpdate(update) {
  const chat = state.chats[update.chatId];
  if (!chat) return;

  const msg = chat.messages.find(m => m.message_id === update.messageId);
  if (msg) {
    msg.translation = update.translation;
    msg.suggestions = update.suggestions || [];
    if (update.transcription) msg.transcription = update.transcription;
  }

  renderIfActive(update.chatId);
}

function addSentMessage(data) {
  const chat = state.chats[data.chatId];
  if (!chat) return;

  chat.messages.push({
    message_id: `sent_${Date.now()}`,
    sender: 'me',
    body: data.text,
    translation: null,
    suggestions: [],
    timestamp: data.timestamp,
  });
  chat.last_activity = data.timestamp;

  renderIfActive(data.chatId);
  updateChatList();
  collapseAllSuggestions();
}

// ─── Rendering ─────────────────────────────────────────────
function updateChatList() {
  const query = $searchInput.value.trim().toLowerCase();
  const sorted = Object.values(state.chats)
    .filter(c => !isChannelChat(c.chat_id))
    .filter(c => {
      if (!query) return true;
      const name = (c.contact_name || '').toLowerCase();
      const num = (c.contact_number || c.chat_id || '').toLowerCase();
      return name.includes(query) || num.includes(query);
    })
    .sort((a, b) => (b.last_activity || 0) - (a.last_activity || 0));

  $chatList.innerHTML = sorted.map(c => {
    const lastMsg = c.messages.length > 0 ? c.messages[c.messages.length - 1] : null;
    const preview = lastMsg ? (lastMsg.sender === 'me' ? 'You: ' : '') + lastMsg.body.substring(0, 40) : '';
    const active = state.activeChat === c.chat_id ? ' active' : '';
    return `<div class="item${active}" onclick="selectChat('${c.chat_id}')">
      <div class="name">${esc(c.contact_name || c.chat_id.substring(0, 12))}</div>
      <div class="preview">${esc(preview)}</div>
      <div class="time">${fmtTime(c.last_activity)}</div>
    </div>`;
  }).join('');

  // Update header if active
  if (state.activeChat && state.chats[state.activeChat]) {
    const c = state.chats[state.activeChat];
    $chatHeader.textContent = `📞 ${c.contact_name || 'Unknown'}${c.contact_number ? ' (+' + c.contact_number + ')' : ''}`;
  }
}

function selectChat(chatId) {
  state.activeChat = chatId;
  $emptyState.style.display = 'none';
  $chatHeader.style.display = 'block';
  $replyBox.style.display = 'flex';
  $searchInput.value = '';

  renderMessages(chatId);
  updateChatList();

  // Scroll to bottom
  setTimeout(() => { $messages.scrollTop = $messages.scrollHeight; }, 50);
}

function renderIfActive(chatId) {
  if (state.activeChat === chatId) {
    renderMessages(chatId);
    setTimeout(() => { $messages.scrollTop = $messages.scrollHeight; }, 50);
  }
}

function renderMessages(chatId) {
  const chat = state.chats[chatId];
  if (!chat) return;
  $chatHeader.textContent = `📞 ${chat.contact_name || 'Unknown'}${chat.contact_number ? ' (+' + chat.contact_number + ')' : ''}`;

  // Get all messages, add suggestion blocks after each customer message
  let html = '';
  const msgs = chat.messages || [];

  for (const msg of msgs) {
    const time = new Date(msg.timestamp * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

    if (msg.sender === 'customer') {
      if (msg.isVoice) {
        // Voice message display
        const transcribed = msg.transcription;
        const cid = escAttr(chatId);
        const mid = escAttr(msg.message_id);
        html += '<div class="msg customer" id="msg-' + escId(msg.message_id) + '">';
        html += '<div class="meta">' + time + '</div>';
        html += '<div>🎤 <em style="color:var(--text-secondary)">Voice Message</em></div>';
        if (transcribed) {
          html += '<div class="trans">' + esc(transcribed) + '</div>';
          html += '<div class="trans" style="color:var(--send-btn);cursor:pointer;margin-top:4px" onclick="translateMsg(\'' + cid + '\',\'' + mid + '\')">🌐 Translate</div>';
        } else {
          html += '<div class="trans" style="color:var(--send-btn);cursor:pointer" onclick="transcribeVoice(\'' + cid + '\',\'' + mid + '\')">🎤 Transcribe</div>';
        }
        html += '</div>';
      } else {
        html += '<div class="msg customer" id="msg-' + escId(msg.message_id) + '">';
        html += '<div class="meta">' + time + '</div>';
        html += '<div>' + esc(msg.body) + '</div>';
        if (msg.translation) {
          html += '<div class="trans">' + esc(msg.translation) + '</div>';
        } else {
          html += '<div class="trans" style="color:var(--text-secondary, #888);cursor:pointer" onclick="translateMsg(\'' + escAttr(chatId) + '\',\'' + escAttr(msg.message_id) + '\')">🌐 Translate</div>';
        }
        html += '</div>';
      }

      // Show existing suggestions OR a "generate" button
      if (msg.suggestions && msg.suggestions.length > 0) {
        html += renderSuggestionBlock(chatId, msg.message_id, msg.suggestions);
      } else {
        html += `<div id="suggest-${escId(msg.message_id)}" style="margin:4px 0 8px 0;">
          <button class="sug-btn" onclick="openReplyModal('${escAttr(chatId)}','${escAttr(msg.message_id)}')" style="font-size:12px">↩ Reply to this message</button>
        </div>`;
      }
    } else {
      html += `<div class="msg me">
        <div class="meta">${time}</div>
        <div>${esc(msg.body)}</div>
      </div>`;
    }
  }

  $messages.innerHTML = html || '<div style="color:#555;text-align:center;padding:40px">No messages yet</div>';
}

// ─── Actions ───────────────────────────────────────────────
function useSuggestion(chatId, index) {
  const chat = state.chats[chatId];
  if (!chat) return;
  const lastCustomerMsg = [...chat.messages].reverse().find(m => m.sender === 'customer');
  if (!lastCustomerMsg || !lastCustomerMsg.suggestions[index]) return;

  const s = lastCustomerMsg.suggestions[index];
  const text = typeof s === 'string' ? s : (s.en || s);
  $replyInput.value = text;
  $replyInput.focus();
}

function sendReply() {
  const text = $replyInput.value.trim();
  if (!text || !state.activeChat) return;

  apiSend(state.activeChat, text);
  $replyInput.value = '';
  autoResizeTextarea($replyInput);
  collapseAllSuggestions();
}

// AI Popup
$aiPopup.addEventListener('click', function(e) {
  if (e.target === $aiPopup) closeAIPopup();
});

// Reply Modal — click outside to close
document.getElementById('replyModal').addEventListener('click', function(e) {
  if (e.target === this) closeReplyModal();
});

function openAIPopup() {
  $aiPrompt.value = '';
  $aiResult.style.display = 'none';
  document.getElementById('aiResultZh').value = '';
  document.getElementById('aiResultEn').style.display = 'none';
  $aiPopup.classList.add('show');
  $aiPrompt.focus();
  // Escape to close
  document.addEventListener('keydown', escClosePopup);
}

async function generateAI() {
  const prompt = $aiPrompt.value.trim();
  if (!prompt || !state.activeChat) return;

  document.querySelector('#aiPopup .btn-gen').disabled = true;
  document.querySelector('#aiPopup .btn-gen').textContent = 'Generating...';

  try {
    const { en, zh } = await apiCustom(state.activeChat, prompt);
    state.aiResultTextZh = zh;
    state.aiResultText = en;
    // Primary: Chinese (editable)
    document.getElementById('aiResultZh').value = zh || '';
    autoResizeTextarea(document.getElementById('aiResultZh'));
    document.getElementById('aiResultEn').textContent = '';
    document.getElementById('aiResultEn').style.display = 'none';
    $aiResult.style.display = 'block';
  } catch (err) {
    document.getElementById('aiResultZh').value = 'Error: ' + err.message;
    autoResizeTextarea(document.getElementById('aiResultZh'));
    $aiResult.style.display = 'block';
  } finally {
    document.querySelector('#aiPopup .btn-gen').disabled = false;
    document.querySelector('#aiPopup .btn-gen').textContent = 'Generate ✨';
  }
}

async function translateAIResult() {
  const zhText = document.getElementById('aiResultZh').value.trim();
  if (!zhText) return;
  const enEl = document.getElementById('aiResultEn');
  enEl.textContent = '⏳ Translating...';
  enEl.style.display = 'block';
  try {
    const res = await fetch('/api/custom', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId: state.activeChat, prompt: 'Translate the following Chinese text to English. Only output the translation, nothing else:\n\n' + zhText }),
    });
    const data = await res.json();
    state.aiResultText = data.reply || data.zh || '';
    enEl.textContent = '🇬🇧 ' + (state.aiResultText || '(no translation)');
  } catch (e) {
    enEl.textContent = '⚠ Translation failed';
  }
}

function sendAIResult(lang) {
  let text;
  if (lang === 'zh') {
    text = document.getElementById('aiResultZh').value.trim();
    state.aiResultTextZh = text;
  } else {
    text = state.aiResultText;
  }
  if (text) {
    $replyInput.value = text;
    closeAIPopup();
    $replyInput.focus();
  }
}

useAIResult = sendAIResult;

// ─── Keyboard ──────────────────────────────────────────────
$replyInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendReply();
  }
});

// Auto-resize textarea to fit content
function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
[$replyInput, $aiPrompt, document.getElementById('aiResultZh'), document.getElementById('modalEditText')].forEach(function(ta) {
  if (ta) {
    ta.addEventListener('input', function() { autoResizeTextarea(ta); });
  }
});

// ─── Helpers ───────────────────────────────────────────────

/** Filter out WhatsApp Channels, Broadcasts, Newsletters */
function isChannelChat(chatId) {
  return chatId && /@newsletter|@broadcast|status@/.test(chatId);
}

function esc(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function escId(s) {
  return (s || '').replace(/[^a-zA-Z0-9_-]/g, '_');
}

function escAttr(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderSuggestionBlock(chatId, msgId, suggestions) {
  const safeId = escId(msgId);
  const count = suggestions.length;
  let cardsHtml = '';
  const labels = ['💼 Professional', '🤝 Friendly', '🎯 Closing', '📋 Detailed', '⚡ Concise'];
  for (let i = 0; i < suggestions.length; i++) {
    const s = suggestions[i];
    const en = typeof s === 'string' ? s : (s.en || s);
    const zh = typeof s === 'string' ? '' : (s.zh || '');
    cardsHtml += `<div class="sug-row" style="margin-bottom:8px">
      <div class="sug-card" style="background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 14px;">
        <div style="font-size:11px;color:#7c4dff;margin-bottom:3px;font-weight:600">${labels[i] || `Option ${i+1}`}</div>
        ${zh ? `<div style="font-size:12px;color:#aaa;margin-bottom:4px;">🇨🇳 ${esc(zh)}</div>` : ''}
        <div style="font-size:13px;color:#ddd;">${esc(en)}</div>
      </div>
    </div>`;
  }

  return `<div class="suggestions" id="suggest-${safeId}">
    <button class="sug-toggle" onclick="toggleSuggestions('${safeId}')" style="padding:5px 12px;background:#1e1e1e;border:1px solid #444;border-radius:6px;color:#ccc;cursor:pointer;font-size:12px">
      💡 ${count} AI Suggestions ▸
    </button>
    <div class="sug-content" id="sug-content-${safeId}" style="display:none;margin-top:8px">
      ${cardsHtml}
      <button class="sug-btn" onclick="openReplyModal('${escAttr(chatId)}','${escAttr(msgId)}')" style="font-size:12px;margin-top:4px">✏️ Reply to this message</button>
    </div>
  </div>`;
}

async function generateSuggestionsFor(chatId, messageId) {
  const container = document.getElementById('suggest-' + escId(messageId));
  if (!container) return;
  container.innerHTML = '<div class="loading">⏳ Generating suggestions...</div>';

  try {
    const res = await fetch('/api/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, messageId }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Update message in state
    const chat = state.chats[chatId];
    if (chat) {
      const msg = chat.messages.find(m => m.message_id === messageId);
      if (msg) {
        msg.translation = data.translation;
        msg.suggestions = data.suggestions;
      }
    }

    container.innerHTML = renderSuggestionBlock(chatId, messageId, data.suggestions);
  } catch (err) {
    container.innerHTML = `<div style="color:#e53935;font-size:12px">Error: ${esc(err.message)}</div>`;
  }
}

function editSuggestion(rowEl) {
  const container = rowEl.closest('.suggestions');
  if (!container) return;
  const panel = container.querySelector('.edit-panel');
  const zhRef = container.querySelector('.edit-zh-ref');
  const textarea = container.querySelector('.edit-textarea');
  const btnSend = container.querySelector('.btn-send-edit');
  const btnCancel = container.querySelector('.btn-cancel-edit');
  const card = rowEl.querySelector('.sug-card');

  if (!panel || !textarea) return;

  // Get data from the clicked card
  const enText = card.getAttribute('data-en');
  const zhText = card.querySelector('[style*="color:#aaa"]');
  zhRef.textContent = zhText ? '🇨🇳 ' + zhText.textContent.replace('🇨🇳 ', '') : '';

  // Fill textarea with English text
  textarea.value = enText;
  autoResizeTextarea(textarea);
  textarea.addEventListener('input', function() { autoResizeTextarea(textarea); });
  panel.style.display = 'block';
  textarea.focus();
  textarea.select();

  // Highlight selected card
  container.querySelectorAll('.sug-card').forEach(c => c.style.borderColor = '#333');
  card.style.borderColor = '#7c4dff';

  // Wire up send
  btnSend.onclick = async () => {
    const text = textarea.value.trim();
    if (!text) return;
    await apiSend(currentActiveChatId(), text);
    panel.style.display = 'none';
    textarea.value = '';
  };

  // Wire up cancel
  btnCancel.onclick = () => {
    panel.style.display = 'none';
    textarea.value = '';
    container.querySelectorAll('.sug-card').forEach(c => c.style.borderColor = '#333');
  };

  // Enter to send, Escape to cancel
  textarea.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      btnSend.click();
    }
    if (e.key === 'Escape') {
      btnCancel.click();
    }
  };
}

function currentActiveChatId() {

}

function toggleSuggestions(safeId) {

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

// ─── Voice transcription ──────────────────────────────────
async function transcribeVoice(chatId, messageId) {
  const el = document.getElementById('msg-' + escId(messageId));
  if (!el) return;
  const transEl = el.querySelector('.trans');
  if (transEl) { transEl.textContent = '⏳ Transcribing...'; transEl.style.cursor = 'default'; transEl.onclick = null; }

  try {
    const res = await fetch('/api/transcribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, messageId }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Update state
    const chat = state.chats[chatId];
    if (chat) {
      const msg = chat.messages.find(m => m.message_id === messageId);
      if (msg) msg.transcription = data.transcription;
    }

    // Re-render to show transcribed text + translate button
    if (isCompact) {
      renderMessages(chatId);
    } else {
      renderIfActive(chatId);
    }
  } catch (err) {
    if (transEl) {
      transEl.textContent = '⚠ ' + (err.message || 'Failed');
      transEl.style.color = '#e53935';
      transEl.style.cursor = 'pointer';
      transEl.onclick = function() { transcribeVoice(chatId, messageId); };
    }
  }
}

// ─── On-demand translation ──────────────────────────────────
async function translateMsg(chatId, messageId) {
  const el = document.getElementById('msg-' + escId(messageId));
  if (!el) return;
  // Show loading
  const transEl = el.querySelector('.trans');
  if (transEl) { transEl.textContent = '⏳ Translating...'; transEl.style.color = 'var(--text-secondary, #888)'; transEl.style.cursor = 'default'; transEl.onclick = null; }

  try {
    const res = await fetch('/api/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, messageId }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Update state
    const chat = state.chats[chatId];
    if (chat) {
      const msg = chat.messages.find(m => m.message_id === messageId);
      if (msg) { msg.translation = data.translation; msg.suggestions = data.suggestions; }
    }

    // Update DOM inline
    if (transEl) {
      transEl.textContent = data.translation || '';
      transEl.style.color = 'var(--text-primary, #aaa)';
      transEl.style.cursor = 'default';
      transEl.onclick = null;
    }
  } catch (err) {
    if (transEl) {
      transEl.textContent = '⚠ ' + (err.message || 'Failed');
      transEl.style.color = '#e53935';
      transEl.style.cursor = 'pointer';
      transEl.onclick = function() { translateMsg(chatId, messageId); };
    }
  }
}

// ─── Compact mode: WhatsApp mobile-style ────────────────────
if (isCompact) {

  // === Avatar color palette ===
  const AVATAR_COLORS = ['#00a884','#25d366','#128c7e','#53bdeb','#5f66cd','#ff3b30','#ff9500','#ffcc02','#34c759','#007aff','#5856d6','#af52de','#ff2d55','#a2845e','#e91e63','#00bcd4'];
  function getAvatarColor(name) {
    let hash = 0;
    for (let i = 0; i < (name || '').length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0;
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }
  function getInitial(name) {
    return ((name || '?')[0] || '?').toUpperCase();
  }

  // === Group filter ===
  let showGroups = false;
  window.toggleGroupFilter = function() {
    showGroups = !showGroups;
    const el = document.getElementById('toggleGroups');
    el.classList.toggle('on', showGroups);
    el.textContent = showGroups ? 'Groups ✓' : 'Groups';
    updateChatList();
  };

  // === Theme toggle ===
  window.toggleTheme = function() {
    document.documentElement.classList.toggle('light');
    const el = document.getElementById('toggleTheme');
    const isLight = document.documentElement.classList.contains('light');
    el.textContent = isLight ? '☀️' : '🌙';
  };

  // === Back button ===
  document.getElementById('backBtn').addEventListener('click', function() {
    state.activeChat = null;
    document.getElementById('sidebar').classList.remove('hide');
    document.getElementById('main').classList.remove('active');
    document.getElementById('backBtn').classList.remove('visible');
    updateChatList();
  });

  // === Override selectChat ===
  const origSelectChat = selectChat;
  selectChat = function(chatId) {
    origSelectChat(chatId);
    document.getElementById('sidebar').classList.add('hide');
    document.getElementById('main').classList.add('active');
    document.getElementById('backBtn').classList.add('visible');
    document.getElementById('replyBox').style.display = 'flex';
    document.getElementById('emptyState').style.display = 'none';
  };

  // === Override renderMessages ===
  renderMessages = function(chatId) {
    const chat = state.chats[chatId];
    if (!chat) return;
    const name = chat.contact_name || 'Unknown';
    const num = chat.contact_number || '';
    document.getElementById('chatHeaderText').textContent = name + (num ? ' (+' + num + ')' : '');
    document.getElementById('chatHeader').style.display = 'flex';

    let html = '';
    const msgs = chat.messages || [];
    for (const msg of msgs) {
      const time = new Date(msg.timestamp * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      if (msg.sender === 'customer') {
        if (msg.isVoice) {
          const cid = escAttr(chatId);
          const mid = escAttr(msg.message_id);
          html += '<div class="msg customer" id="msg-' + escId(msg.message_id) + '">';
          html += '<div class="meta">' + time + '</div>';
          html += '<div>🎤 <em style="color:var(--text-secondary)">Voice Message</em></div>';
          if (msg.transcription) {
            html += '<div class="trans">' + esc(msg.transcription) + '</div>';
            html += '<div class="trans" style="color:var(--send-btn);cursor:pointer;margin-top:4px" onclick="translateMsg(\'' + cid + '\',\'' + mid + '\')">🌐 Translate</div>';
          } else {
            html += '<div class="trans" style="color:var(--send-btn);cursor:pointer" onclick="transcribeVoice(\'' + cid + '\',\'' + mid + '\')">🎤 Transcribe</div>';
          }
          html += '</div>';
        } else {
          html += '<div class="msg customer" id="msg-' + escId(msg.message_id) + '"><div class="meta">' + time + '</div><div>' + esc(msg.body) + '</div>';
          if (msg.translation) {
            html += '<div class="trans">' + esc(msg.translation) + '</div>';
          } else {
            html += '<div class="trans" style="color:var(--text-secondary);cursor:pointer" onclick="translateMsg(\'' + escAttr(chatId) + '\',\'' + escAttr(msg.message_id) + '\')">🌐 Translate</div>';
          }
          html += '</div>';
        }
        if (msg.suggestions && msg.suggestions.length > 0) {
          html += renderSuggestionBlock(chatId, msg.message_id, msg.suggestions);
        } else {
          html += '<div id="suggest-' + escId(msg.message_id) + '" style="margin:4px 0 8px 0"><button class="sug-btn" onclick="openReplyModal(\'' + escAttr(chatId) + '\',\'' + escAttr(msg.message_id) + '\')" style="font-size:12px">↩ Reply</button></div>';
        }
      } else {
        html += '<div class="msg me"><div class="meta">' + time + '</div><div>' + esc(msg.body) + '</div></div>';
      }
    }
    document.getElementById('messages').innerHTML = html || '<div style="color:var(--text-secondary);text-align:center;padding:40px">No messages</div>';
  };

  // === Override updateChatList — avatars, group filtering, divider ===
  updateChatList = function() {
    const query = $searchInput.value.trim().toLowerCase();
    let allChats = Object.values(state.chats);
    const isGroup = function(id) { return (id || '').indexOf('@g.us') > 0; };

    // Search filter
    if (query) {
      allChats = allChats.filter(function(c) {
        const name = (c.contact_name || '').toLowerCase();
        const num = (c.contact_number || c.chat_id || '').toLowerCase();
        return name.includes(query) || num.includes(query);
      });
    }

    const personal = allChats.filter(function(c) { return !isGroup(c.chat_id); });
    const groups   = allChats.filter(function(c) { return  isGroup(c.chat_id); });

    personal.sort(function(a,b) { return (b.last_activity||0) - (a.last_activity||0); });
    groups.sort(function(a,b) { return (b.last_activity||0) - (a.last_activity||0); });

    var html = '';

    // Personal chats
    for (var i = 0; i < personal.length; i++) {
      html += renderChatItem(personal[i], false);
    }

    // Group divider + group items (only when enabled)
    if (showGroups && groups.length > 0) {
      html += '<div class="divider">Groups &mdash; ' + groups.length + '</div>';
      for (var j = 0; j < groups.length; j++) {
        html += renderChatItem(groups[j], true);
      }
    }

    $chatList.innerHTML = html;
  };

  function renderChatItem(c, isGrp) {
    var lastMsg = c.messages.length > 0 ? c.messages[c.messages.length - 1] : null;
    var preview = lastMsg ? (lastMsg.sender === 'me' ? 'You: ' : '') + lastMsg.body.substring(0, 40) : '';
    var name = c.contact_name || (c.chat_id || '').substring(0, 12);
    var active = state.activeChat === c.chat_id ? ' active' : '';
    return '<div class="item' + active + '" onclick="selectChat(\'' + c.chat_id + '\')">' +
      '<div class="avatar" style="background:' + getAvatarColor(name) + '">' + getInitial(name) + '</div>' +
      '<div class="info">' +
        '<div class="name">' + esc(name) + '</div>' +
        '<div class="preview">' + esc(preview) + (isGrp ? ' <span class="group-tag">群</span>' : '') + '</div>' +
      '</div>' +
      '<div class="meta"><div class="time">' + fmtTime(c.last_activity) + '</div></div>' +
    '</div>';
  }

  // === Override checkWhatsAppStatus ===
  checkWhatsAppStatus = async function() {
    try {
      const r = await fetch('/api/status');
      const s = await r.json();
      const el = document.querySelector('#sidebar .status');
      if (el) {
        if (s.whatsappReady) { el.textContent = '● Connected'; el.style.color = '#00a884'; }
        else { el.textContent = '○ Connecting...'; el.style.color = '#8696a0'; setTimeout(checkWhatsAppStatus, 3000); }
      }
    } catch(e) { setTimeout(checkWhatsAppStatus, 3000); }
  };

  // === Override SSE ===
  connectSSE = function() {
    const es = new EventSource('/api/events');
    es.addEventListener('connected', () => {
      const el = document.querySelector('#sidebar .status');
      if (el) { el.textContent = '● Checking...'; el.style.color = '#ff9800'; }
      loadChats(); checkWhatsAppStatus();
    });
    es.addEventListener('new_message', (e) => { addMessage(JSON.parse(e.data)); updateChatList(); });
    es.addEventListener('message_updated', (e) => { applyUpdate(JSON.parse(e.data)); });
    es.addEventListener('message_sent', (e) => { addSentMessage(JSON.parse(e.data)); updateChatList(); });
    es.addEventListener('chat_synced', (e) => {
      const d = JSON.parse(e.data);
      if (isChannelChat(d.chatId)) return;
      if (!state.chats[d.chatId]) {
        state.chats[d.chatId] = { chat_id: d.chatId, contact_name: d.contactName, contact_number: d.contactNumber, last_activity: Date.now()/1000, messages: [] };
        loadHistory(d.chatId);
      }
      updateChatList();
    });
    es.onerror = () => {
      const el = document.querySelector('#sidebar .status');
      if (el) { el.textContent = '○ Reconnecting...'; el.style.color = '#8696a0'; }
    };
  };
}

connectSSE();

// ─── Reply Modal ───────────────────────────────────────────────
let modalState = { chatId: null, messageId: null, suggestions: [], selectedIdx: -1 };

async function openReplyModal(chatId, messageId) {
  modalState.chatId = chatId;
  modalState.messageId = messageId;
  modalState.suggestions = [];
  modalState.selectedIdx = -1;

  const modal = document.getElementById('replyModal');
  const preview = document.getElementById('modalMsgPreview');
  const cards = document.getElementById('modalOptCards');
  const textarea = document.getElementById('modalEditText');

  // Show customer message preview
  const chat = state.chats[chatId];
  const msg = chat ? chat.messages.find(m => m.message_id === messageId) : null;
  if (msg) {
    preview.innerHTML = `<div>${esc(msg.body)}</div>` + (msg.translation ? `<div class="zh">🇨🇳 ${esc(msg.translation)}</div>` : '');
  } else {
    preview.innerHTML = '<div style="color:#666">Message not found</div>';
  }

  cards.innerHTML = '<div style="color:#666;text-align:center;padding:15px">⏳ Generating suggestions...</div>';
  textarea.value = '';
  autoResizeTextarea(textarea);
  document.getElementById('modalTranslation').style.display = 'none';
  document.querySelector('#replyModal .btn-en').disabled = true;
  document.querySelector('#replyModal .btn-zh').disabled = true;

  // Reset suggestions visibility
  modalSuggestionsVisible = false;
  const toggleBtn = document.getElementById('modalToggleSuggestions');
  if (toggleBtn) toggleBtn.textContent = '💡 Suggestions ▸';

  modal.classList.add('show');

  // Escape to close
  document.addEventListener('keydown', escCloseModal);

  // Fetch suggestions
  await fetchSuggestionsForModal();
}

function escCloseModal(e) {
  if (e.key === 'Escape') closeReplyModal();
}

function closeReplyModal() {
  document.getElementById('replyModal').classList.remove('show');
  document.getElementById('modalOptCards').style.display = 'none';
  modalSuggestionsVisible = false;
  document.removeEventListener('keydown', escCloseModal);
}

async function fetchSuggestionsForModal() {
  const cards = document.getElementById('modalOptCards');
  try {
    const res = await fetch('/api/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId: modalState.chatId, messageId: modalState.messageId }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    modalState.suggestions = data.suggestions;
    renderModalCards(data.suggestions);

    // Also update translation in state
    const chat = state.chats[modalState.chatId];
    if (chat) {
      const msg = chat.messages.find(m => m.message_id === modalState.messageId);
      if (msg) { msg.translation = data.translation; msg.suggestions = data.suggestions; }
    }
    // Refresh preview with translation
    const preview = document.getElementById('modalMsgPreview');
    const msg = chat ? chat.messages.find(m => m.message_id === modalState.messageId) : null;
    if (msg && data.translation && !preview.querySelector('.zh')) {
      preview.innerHTML = `<div>${esc(msg.body)}</div><div class="zh">🇨🇳 ${esc(data.translation)}</div>`;
    }
  } catch (err) {
    cards.innerHTML = `<div style="color:#e53935;text-align:center;padding:20px">Error: ${esc(err.message)}<br><button class="sug-btn" onclick="retryModalSuggestions()" style="margin-top:8px">🔄 Retry</button></div>`;
  }
}

function retryModalSuggestions() {
  document.getElementById('modalOptCards').innerHTML = '<div style="color:#666;text-align:center;padding:30px">⏳ Retrying...</div>';
  fetchSuggestionsForModal();
}

function renderModalCards(suggestions) {
  const cards = document.getElementById('modalOptCards');
  const labels = ['💼 Professional', '🤝 Friendly', '🎯 Closing', '📋 Detailed', '⚡ Concise'];
  let html = '<div class="opt-cards-inner" style="display:flex;flex-direction:column;gap:6px">';
  for (let i = 0; i < suggestions.length; i++) {
    const s = suggestions[i];
    const zh = typeof s === 'string' ? s : (s.zh || s.en || '');
    const preview = zh.length > 50 ? zh.substring(0, 50) + '…' : zh;
    html += '<div class="opt-card' + (modalState.selectedIdx === i ? ' selected' : '') + '" onclick="selectModalCard(' + i + ')" id="modalCard' + i + '" style="padding:8px 12px;background:var(--bg-input-field);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden">' +
      '<span style="font-size:11px;font-weight:600;color:var(--send-btn);flex-shrink:0">' + (labels[i] || '#' + (i + 1)) + '</span>' +
      '<span style="color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(preview) + '</span>' +
    '</div>';
  }
  html += '</div>';
  cards.innerHTML = html;

  const btn = document.getElementById('modalToggleSuggestions');
  if (btn) btn.textContent = '💡 ' + suggestions.length + ' Suggestions ▸';
}

// Toggle suggestions visibility
let modalSuggestionsVisible = false;
function toggleModalSuggestions() {
  modalSuggestionsVisible = !modalSuggestionsVisible;
  const cards = document.getElementById('modalOptCards');
  const btn = document.getElementById('modalToggleSuggestions');
  if (modalSuggestionsVisible) {
    cards.style.display = 'block';
    btn.textContent = (btn.textContent || '').replace('▸', '▾');
  } else {
    cards.style.display = 'none';
    btn.textContent = (btn.textContent || '').replace('▾', '▸');
  }
}

function selectModalCard(index) {
  modalState.selectedIdx = index;
  const s = modalState.suggestions[index];
  if (!s) return;

  // Fill with Chinese (primary, editable)
  const zh = typeof s === 'string' ? s : (s.zh || s.en || s);
  const textarea = document.getElementById('modalEditText');
  textarea.value = zh;
  autoResizeTextarea(textarea);
  textarea.focus();

  // Clear any previous translation
  document.getElementById('modalTranslation').style.display = 'none';

  // Highlight selected
  document.querySelectorAll('#modalOptCards .opt-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('modalCard' + index)?.classList.add('selected');

  // Enable send buttons
  document.querySelector('#replyModal .btn-en').disabled = false;
  document.querySelector('#replyModal .btn-zh').disabled = false;
}

async function translateModalText() {
  const zhText = document.getElementById('modalEditText').value.trim();
  if (!zhText) return;
  const el = document.getElementById('modalTranslation');
  el.textContent = '⏳ Translating...';
  el.style.display = 'block';
  try {
    const res = await fetch('/api/custom', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId: modalState.chatId || state.activeChat, prompt: 'Translate the following Chinese text to English. Only output the translation, nothing else:\n\n' + zhText }),
    });
    const data = await res.json();
    const en = data.reply || data.zh || '';
    el.textContent = '🇬🇧 ' + (en || '(no translation)');
  } catch (e) {
    el.textContent = '⚠ Translation failed';
  }
}

async function sendModalReply(lang) {
  const textarea = document.getElementById('modalEditText');
  const zhText = textarea.value.trim();
  if (!zhText) return;

  let text = zhText;

  if (lang === 'en') {
    // Use the translated English from modalTranslation if available
    const transEl = document.getElementById('modalTranslation');
    const transText = (transEl.textContent || '').replace('🇬🇧 ', '').trim();
    if (transText && transText !== '(no translation)' && transText !== '⚠ Translation failed' && transText.indexOf('⏳') !== 0) {
      text = transText;
    } else {
      // No translation available — auto-translate
      try {
        const res = await fetch('/api/custom', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chatId: modalState.chatId, prompt: 'Translate to English:\n\n' + zhText }),
        });
        const data = await res.json();
        text = data.reply || data.zh || zhText;
      } catch (e) {
        text = zhText; // fallback to Chinese
      }
    }
  }

  await apiSend(modalState.chatId, text);
  closeReplyModal();
  collapseAllSuggestions();
}

  $aiPopup.classList.remove('show');
  document.removeEventListener('keydown', escClosePopup);
}

function escClosePopup(e) {
  if (e.key === 'Escape') closeAIPopup();
}

function closeReplyModal() {
  document.getElementById('replyModal').classList.remove('show');
  document.getElementById('modalOptCards').style.display = 'none';
  modalSuggestionsVisible = false;
}

</script>
</body>
</html>
