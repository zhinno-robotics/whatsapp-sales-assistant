<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>Settings — WhatsApp Sales Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #111b21; color: #e9edef; width: 320px; padding: 16px;
}
h2 { font-size: 16px; margin-bottom: 16px; color: #00a884; }
.section { margin-bottom: 16px; }
.section h3 { font-size: 12px; color: #8696a0; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
label { display: block; font-size: 12px; color: #8696a0; margin-bottom: 4px; }
input, select {
  width: 100%; background: #202c33; border: 1px solid #2a3942; border-radius: 6px;
  color: #e9edef; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none;
}
input:focus, select:focus { border-color: #00a884; }
input[type="checkbox"] { width: auto; margin-right: 6px; }
.checkbox-label { display: flex; align-items: center; font-size: 13px; color: #e9edef; margin-bottom: 8px; }
.btn {
  width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; margin-top: 8px;
}
.btn-primary { background: #00a884; color: #111b21; }
.btn-primary:hover { background: #00c49a; }
.btn-secondary { background: #2a3942; color: #8696a0; }
.btn-secondary:hover { background: #3a4952; }
#status {
  font-size: 13px; font-weight: 500; margin-top: 12px; text-align: center;
  min-height: 24px; padding: 6px; border-radius: 6px;
}
#status.success { color: #00a884; background: rgba(0,168,132,0.1); }
#status.error { color: #ff6b6b; background: rgba(255,107,107,0.1); }
.divider { height: 1px; background: #2a3942; margin: 16px 0; }
</style>
</head>
<body>

<h2>⚙️ Settings</h2>

<div class="section">
  <h3>AI Configuration</h3>
  <label>LLM Base URL</label>
  <input type="text" id="llmBaseURL" placeholder="https://api.deepseek.com/v1" />
  <label style="margin-top:8px">LLM API Key</label>
  <input type="password" id="llmApiKey" placeholder="sk-..." />
  <label style="margin-top:8px">LLM Model</label>
  <input type="text" id="llmModel" placeholder="deepseek-chat" />
</div>

<div class="section">
  <h3>Voice Transcription (STT)</h3>
  <label>STT Base URL</label>
  <input type="text" id="sttBaseURL" placeholder="https://openrouter.ai/api/v1" />
  <label style="margin-top:8px">STT API Key</label>
  <input type="password" id="sttApiKey" placeholder="sk-or-..." />
  <label style="margin-top:8px">STT Model</label>
  <input type="text" id="sttModel" placeholder="openai/gpt-4o" />
</div>

<div class="section">
  <h3>Language</h3>
  <label>Your Language</label>
  <select id="userNativeLang">
    <option value="zh">Chinese (中文)</option>
    <option value="en">English</option>
  </select>
  <label style="margin-top:8px">Customer Language</label>
  <select id="customerLang">
    <option value="en">English</option>
    <option value="zh">Chinese (中文)</option>
  </select>
  <label style="margin-top:8px">Context Window</label>
  <input type="number" id="contextWindow" min="5" max="30" value="10" />
</div>

<div class="section">
  <h3>Behavior</h3>
  <label class="checkbox-label">
    <input type="checkbox" id="autoOpenSidePanel" checked />
    Auto-open side panel on WhatsApp Web
  </label>
  <label class="checkbox-label">
    <input type="checkbox" id="autoTranscribe" />
    Auto-transcribe voice messages
  </label>
</div>

<button class="btn btn-primary" id="saveBtn">Save Settings</button>
<button class="btn btn-secondary" id="testBtn">Test LLM Connection</button>
<button class="btn btn-secondary" id="openPanelBtn" style="margin-top:4px;background:#00a884;color:#111b21;font-weight:600">📱 Open Side Panel</button>

<div id="status"></div>

<script src="popup.js"></script>
</body>
</html>
